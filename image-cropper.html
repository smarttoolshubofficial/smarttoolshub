<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Cropper - SmartToolsHub</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h1{
text-align:center;
margin-bottom:20px;
}

input,button{
width:100%;
padding:12px;
margin-top:15px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#2563eb;
color:white;
border:none;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#1d4ed8;
}

canvas{
width:100%;
margin-top:20px;
border:1px solid #ddd;
border-radius:8px;
}

#download{
display:none;
margin-top:20px;
padding:12px;
background:#16a34a;
color:white;
text-align:center;
text-decoration:none;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<h1>Image Cropper</h1>

<input type="file" id="imageInput" accept="image/*">

<button onclick="cropImage()">Crop Center Image</button>

<canvas id="canvas"></canvas>

<a id="download" download="cropped-image.png">
Download Cropped Image
</a>

</div>


<script>

const input=document.getElementById("imageInput");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const download=document.getElementById("download");

let img=new Image();


input.addEventListener("change",function(e){

let file=e.target.files[0];

if(!file) return;

let reader=new FileReader();

reader.onload=function(event){

img.onload=function(){

canvas.width=img.width/2;
canvas.height=img.height/2;

ctx.drawImage(
img,
img.width/4,
img.height/4,
img.width/2,
img.height/2,
0,
0,
canvas.width,
canvas.height
);

}

img.src=event.target.result;

}

reader.readAsDataURL(file);

});


function cropImage(){

if(!img.src){
alert("Please upload an image first!");
return;
}


canvas.style.display="block";

let imageData=canvas.toDataURL("image/png");

download.href=imageData;
download.style.display="block";

}

</script>

</body>
</html>
